services:
  postgres:
    image: postgres:18
    environment:
      POSTGRES_DB: crmkit
      POSTGRES_USER: crmkit
      POSTGRES_PASSWORD: crmkit
    ports:
      - "15432:5432"
    volumes:
      - pgdata:/var/lib/postgresql
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U crmkit"]
      interval: 5s
      timeout: 3s
      retries: 5

  redis:
    image: redis:8
    ports:
      - "16379:6379"
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 5

volumes:
  pgdata:
